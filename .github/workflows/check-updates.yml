name: Check Upstream Versions & Trigger OBS

on:
  schedule:
    # Runs every 6 hours (cron syntax: min hour day month weekday)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — check versions only, do NOT trigger OBS or commit'
        required: false
        default: false
        type: boolean
      force_package:
        description: 'Force-trigger a specific package name (leave empty to check all)'
        required: false
        default: ''
        type: string

# ── Concurrency guard ────────────────────────────────────────────────────────
# Prevents two scheduled runs from overlapping and racing on the git push.
# cancel-in-progress: false lets the running job finish; new runs queue behind it.
concurrency:
  group: obs-check-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # needed to commit versions.json back to the repo

# ── Job-level env vars ───────────────────────────────────────────────────────
# Defined once here; referenced via ${{ env.X }} below to avoid repetition.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OBS_PROJECT:    ${{ vars.OBS_PROJECT || 'home:itachi_re' }}
  VERSIONS_OLD:   versions.json
  VERSIONS_NEW:   versions_new.json
  PYTHON_VERSION: '3.12'

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      # ── 2. Python setup ──────────────────────────────────────────────────
      # cache: 'pip' is omitted — it requires a requirements file to produce a
      # stable cache key and is a no-op without one.
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install 'nvchecker[all]' requests

      # ── 4. Validate required secrets ─────────────────────────────────────
      # Secrets must be surfaced through env vars — embedding them directly in
      # shell expressions (e.g. if [ -z "${{ secrets.X }}" ]) prints the value
      # in the runner's expanded command log, defeating masking.
      - name: Validate required secrets
        env:
          _OBS_TOKEN: ${{ secrets.OBS_TOKEN }}
        run: |
          set -euo pipefail
          rc=0
          if [ -z "${_OBS_TOKEN}" ]; then
            echo "❌ ERROR: OBS_TOKEN secret is not set."
            echo "   See README.md for instructions on creating an OBS token."
            rc=1
          fi
          [ "$rc" -eq 0 ] && echo "✅ All required secrets are present."
          exit "$rc"

      # ── 5. Bootstrap versions.json on first run ───────────────────────────
      # nvchecker needs an existing keyfile; create an empty one if absent.
      - name: Bootstrap versions.json if missing
        run: |
          set -euo pipefail
          if [ ! -f "${{ env.VERSIONS_OLD }}" ]; then
            echo "{}" > "${{ env.VERSIONS_OLD }}"
            echo "ℹ️  Created empty ${{ env.VERSIONS_OLD }} (first run)."
          fi

      # ── 6. Run nvchecker ──────────────────────────────────────────────────
      # File paths are declared in nvchecker.toml under [__config__]:
      #   oldver = "versions.json"      ← input:  last-known versions
      #   newver = "versions_new.json"  ← output: freshly detected versions
      # Do NOT pass --keyfile / --save here — the toml owns those paths and
      # the --save flag does not exist in current nvchecker releases.
      #
      # nvchecker exits non-zero when updates are found, so || true lets the
      # pipeline continue; we inspect the outputs ourselves.
      #
      # Token priority: prefer a fine-grained PAT (higher rate limits) and
      # fall back to the built-in GITHUB_TOKEN if NVCHECKER_PAT is not set.
      - name: Run nvchecker
        id: nvchecker
        env:
          NVCHECKER_GITHUB_TOKEN: ${{ secrets.NVCHECKER_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "Running nvchecker against nvchecker.toml …"

          nvchecker \
            -c nvchecker.toml \
            --logger json \
            2>nvchecker_errors.log | tee nvchecker_output.jsonl \
            || true   # allow pipeline to continue even if nvchecker exits non-zero

          # Surface warnings/errors in the workflow log
          if [ -s nvchecker_errors.log ]; then
            echo ""
            echo "⚠️  nvchecker warnings / errors:"
            cat nvchecker_errors.log
          fi

          # Safety net: if nvchecker produced no output file, copy the old one
          # so downstream steps always have a valid VERSIONS_NEW to work with.
          if [ ! -f "${{ env.VERSIONS_NEW }}" ]; then
            echo "ℹ️  No new versions file produced — copying old versions as baseline."
            cp "${{ env.VERSIONS_OLD }}" "${{ env.VERSIONS_NEW }}"
          fi

      # ── 7. Show human-readable version diff ───────────────────────────────
      - name: Show version diff
        run: |
          set -euo pipefail
          echo "=== Version diff (old → new) ==="
          python - <<'EOF'
          import json, sys

          def load(path):
              try:
                  with open(path) as f:
                      raw = json.load(f)
              except (FileNotFoundError, json.JSONDecodeError):
                  return {}
              # Unwrap nvchecker v2 envelope: {"version": 2, "data": {...}}
              if isinstance(raw.get("version"), int) and isinstance(raw.get("data"), dict):
                  raw = raw["data"]
              # Flatten dict values to plain version strings
              return {
                  k: (v.get("version", str(v)) if isinstance(v, dict) else str(v))
                  for k, v in raw.items()
              }

          old = load("${{ env.VERSIONS_OLD }}")
          new = load("${{ env.VERSIONS_NEW }}")

          changed = {k: (old.get(k, "(new)"), new[k]) for k in new if old.get(k) != new[k]}

          if not changed:
              print("  (no version changes detected)")
              sys.exit(0)

          col = max(len(k) for k in changed) + 2
          for pkg, (prev, curr) in sorted(changed.items()):
              print(f"  {pkg:<{col}} {prev}  →  {curr}")
          EOF

      # ── 8a. Force-trigger a single package (optional) ─────────────────────
      # DRY_RUN is passed via env — trigger_obs.py reads os.environ["DRY_RUN"].
      # Do NOT pass --dry-run as a CLI argument; the script does not accept it.
      - name: Force-trigger specific package
        if: ${{ github.event.inputs.force_package != '' }}
        env:
          OBS_TOKEN:     ${{ secrets.OBS_TOKEN }}
          FORCE_PACKAGE: ${{ github.event.inputs.force_package }}
          DRY_RUN:       ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          python scripts/trigger_obs.py \
            --force-package "$FORCE_PACKAGE"

      # ── 8b. Trigger OBS for all updated packages ──────────────────────────
      # DRY_RUN is passed via env — trigger_obs.py reads os.environ["DRY_RUN"].
      - name: Trigger OBS service runs for updated packages
        if: ${{ github.event.inputs.force_package == '' }}
        env:
          OBS_TOKEN: ${{ secrets.OBS_TOKEN }}
          DRY_RUN:   ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          python scripts/trigger_obs.py \
            --old-versions "${{ env.VERSIONS_OLD }}" \
            --new-versions "${{ env.VERSIONS_NEW }}" \
            --output-summary trigger_summary.json

      # ── 9. Print summary to log AND the Actions summary page ──────────────
      - name: Print trigger summary
        if: always()
        run: |
          set -euo pipefail
          if [ ! -f trigger_summary.json ]; then
            echo "No trigger_summary.json produced — skipping summary."
            exit 0
          fi

          python - <<'EOF'
          import json, os

          with open("trigger_summary.json") as f:
              s = json.load(f)

          # ── Plain-text log output ──────────────────────────────────────
          print("=== Trigger Summary ===")
          print(f"  Packages checked  : {s.get('checked', 0)}")
          print(f"  Updates found     : {s.get('updated', 0)}")
          print(f"  OBS triggers sent : {s.get('triggered', 0)}")
          print(f"  Failures          : {s.get('failed', 0)}")

          if s.get("updated_list"):
              print("\nUpdated packages:")
              for p in s["updated_list"]:
                  print(f"  {p['package']}: {p['old']} → {p['new']} [{p['status']}]")

          if s.get("failed_list"):
              print("\nFailed packages:")
              for p in s["failed_list"]:
                  print(f"  {p['package']}: {p['error']}")

          # ── Markdown table for the GitHub Actions summary page ─────────
          md = ["## OBS Trigger Summary\n"]
          md += [
              "| Metric | Value |",
              "|--------|------:|",
              f"| Packages checked  | {s.get('checked', 0)} |",
              f"| Updates found     | {s.get('updated', 0)} |",
              f"| OBS triggers sent | {s.get('triggered', 0)} |",
              f"| Failures          | {s.get('failed', 0)} |",
          ]

          if s.get("updated_list"):
              md += [
                  "\n### Updated packages",
                  "| Package | Old | New | Status |",
                  "|---------|-----|-----|--------|",
              ]
              for p in s["updated_list"]:
                  md.append(f"| `{p['package']}` | `{p['old']}` | `{p['new']}` | {p['status']} |")

          if s.get("failed_list"):
              md += [
                  "\n### Failed packages",
                  "| Package | Error |",
                  "|---------|-------|",
              ]
              for p in s["failed_list"]:
                  md.append(f"| `{p['package']}` | {p['error']} |")

          ghs = os.environ.get("GITHUB_STEP_SUMMARY")
          if ghs:
              with open(ghs, "a") as f:
                  f.write("\n".join(md) + "\n")
          EOF

      # ── 10. Commit updated versions.json ──────────────────────────────────
      - name: Commit updated versions.json
        # always() ensures this step runs even when a prior step exits non-zero
        # (e.g. trigger_obs.py returning 1 because one package failed to trigger).
        # Without always(), GitHub Actions skips this step on any prior failure,
        # which is exactly what kept versions.json stuck at {} forever.
        # The dry-run guard is still enforced via the second condition.
        if: ${{ always() && (github.event.inputs.dry_run || 'false') != 'true' }}
        run: |
          set -euo pipefail

          # Smart merge:
          #   - Packages that triggered successfully  → advance their version
          #   - Packages in failed_list              → keep old version (retry next run)
          #   - versions_new.json may be a nvchecker v2 envelope {"version":2,"data":{...}}
          #     so we unwrap it the same way trigger_obs.py does.
          python - <<'EOF'
          import json

          def load_flat(path):
              """Load a versions file and return a flat {pkg: version_str} dict."""
              try:
                  with open(path) as f:
                      raw = json.load(f)
              except (FileNotFoundError, json.JSONDecodeError):
                  return {}
              # Unwrap nvchecker v2 envelope
              if isinstance(raw.get("version"), int) and isinstance(raw.get("data"), dict):
                  raw = raw["data"]
              return {
                  k: (v.get("version", str(v)) if isinstance(v, dict) else str(v))
                  for k, v in raw.items()
              }

          def load_json(path):
              try:
                  with open(path) as f:
                      return json.load(f)
              except (FileNotFoundError, json.JSONDecodeError):
                  return {}

          old     = load_flat("versions.json")
          new     = load_flat("versions_new.json")
          summary = load_json("trigger_summary.json")

          # Packages whose OBS trigger failed — hold back so they retry next run
          failed_pkgs = {p["package"] for p in summary.get("failed_list", [])}
          if failed_pkgs:
              print(f"⚠️  {len(failed_pkgs)} package(s) failed triggering — "
                    f"held back for retry: {', '.join(sorted(failed_pkgs))}")

          merged = dict(old)
          added = changed = skipped = 0
          for pkg, ver in new.items():
              # Also skip null/empty versions that slipped through
              if not ver or ver.strip().lower() == "null":
                  skipped += 1
                  continue
              if pkg in failed_pkgs:
                  skipped += 1
                  continue
              if pkg not in old:
                  added += 1
              elif old[pkg] != ver:
                  changed += 1
              merged[pkg] = ver

          with open("versions.json", "w") as f:
              json.dump(merged, f, indent=2, sort_keys=True)
              f.write("\n")

          print(f"Merged {len(new)} entries: {changed} updated, "
                f"{added} newly tracked, {skipped} held back.")
          EOF

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json

          if git diff --staged --quiet; then
            echo "versions.json is unchanged — skipping commit."
          else
            # Rebase onto any commits that landed while this job was running
            git pull --rebase --autostash origin HEAD
            git commit -m "chore: update known package versions [skip ci]"
            git push
            echo "✅ Pushed updated versions.json"
          fi

      # ── 11. Upload debug artifacts ────────────────────────────────────────
      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: nvchecker-run-${{ github.run_number }}
          path: |
            nvchecker_output.jsonl
            nvchecker_errors.log
            trigger_summary.json
          if-no-files-found: ignore   # don't fail if a file was never created
          retention-days: 14
