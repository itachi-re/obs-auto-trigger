# nvchecker.toml — upstream version checker for home:itachi_re
#
# This file tells nvchecker WHERE to find the latest upstream version
# of each of your OBS packages. nvchecker supports:
#   GitHub releases/tags, KDE invent.kde.org (GitLab), PyPI, AUR,
#   generic git tags, HTML scraping, custom shell commands, and more.
#
# Docs: https://nvchecker.readthedocs.io/en/latest/usage.html
#
# ── How nvchecker uses this file ─────────────────────────────────────────────
# 1. Reads KNOWN versions from   versions.json     (committed to git)
# 2. Checks UPSTREAM versions,   writes to         versions_new.json
# 3. trigger_obs.py diffs old vs new, fires OBS API for changed packages
# 4. GitHub Actions commits updated versions.json back to the repo
# ─────────────────────────────────────────────────────────────────────────────

[__config__]
oldver = "versions.json"
newver = "versions_new.json"

# ── Optional: keyfile for tokens (create .nvchecker_keyfile.toml, git-ignored)
# keyfile = ".nvchecker_keyfile.toml"


